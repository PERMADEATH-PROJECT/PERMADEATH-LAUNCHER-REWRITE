<aside class="w-80 bg-sidebar text-white min-h-screen flex flex-col pb-8 shrink-0">
  <!-- Header -->
  <div class="flex items-center gap-3.5 px-8 pt-8 pb-5">
    <span class="relative flex items-center">
      <lucide-icon [img]="Skull" class="sidebar__skull"></lucide-icon>
      <lucide-icon [img]="Heart" class="sidebar__heart"></lucide-icon>
    </span>
    <div>
      <h1 class="text-[1.7rem] m-0 text-brand-red font-bold tracking-wide leading-none">PERMADEATH</h1>
      <span class="text-[#5c5c6c] text-base font-medium">SMP Launcher</span>
    </div>
  </div>

  <hr class="border-none border-t border-[#231f23] mx-5 my-4" />

  <!-- Nav -->
  <nav class="flex flex-col gap-2.5 px-6">
    <a routerLink="/play" routerLinkActive="!bg-brand-red text-white font-semibold shadow-[0_2px_10px_0_#f12b4340] hover:!bg-[#2e1017]"
       class="flex items-center gap-3 no-underline text-white bg-sidebar-btn rounded-xl text-[1.08rem] px-5 py-3 transition-colors duration-150 font-medium border-none outline-none cursor-pointer hover:bg-sidebar-btn-hover">
      <lucide-icon [img]="Swords" class="w-5 h-5 stroke-[2px] text-white"></lucide-icon> Play
    </a>
    <a routerLink="/config" routerLinkActive="!bg-brand-red text-white font-semibold shadow-[0_2px_10px_0_#f12b4340] hover:!bg-[#2e1017]"
       class="flex items-center gap-3 no-underline text-white bg-sidebar-btn rounded-xl text-[1.08rem] px-5 py-3 transition-colors duration-150 font-medium border-none outline-none cursor-pointer hover:bg-sidebar-btn-hover">
      <lucide-icon [img]="Settings" class="w-5 h-5 stroke-[2px] text-brand-gray"></lucide-icon> Settings
    </a>
    <a routerLink="/vm" routerLinkActive="!bg-brand-red text-white font-semibold shadow-[0_2px_10px_0_#f12b4340] hover:!bg-[#2e1017]"
       class="flex items-center gap-3 no-underline text-white bg-sidebar-btn rounded-xl text-[1.08rem] px-5 py-3 transition-colors duration-150 font-medium border-none outline-none cursor-pointer hover:bg-sidebar-btn-hover">
      <lucide-icon [img]="Zap" class="w-5 h-5 stroke-[2px] text-brand-yellow"></lucide-icon> Java VM
    </a>
    <a routerLink="/updates" routerLinkActive="!bg-brand-red text-white font-semibold shadow-[0_2px_10px_0_#f12b4340] hover:!bg-[#2e1017]"
       class="flex items-center gap-3 no-underline text-white bg-sidebar-btn rounded-xl text-[1.08rem] px-5 py-3 transition-colors duration-150 font-medium border-none outline-none cursor-pointer hover:bg-sidebar-btn-hover">
      <lucide-icon [img]="Download" class="w-5 h-5 stroke-[2px] text-brand-blue"></lucide-icon> Updates
    </a>
    <a routerLink="/account" routerLinkActive="!bg-brand-red text-white font-semibold shadow-[0_2px_10px_0_#f12b4340] hover:!bg-[#2e1017]"
       class="flex items-center gap-3 no-underline text-white bg-sidebar-btn rounded-xl text-[1.08rem] px-5 py-3 transition-colors duration-150 font-medium border-none outline-none cursor-pointer hover:bg-sidebar-btn-hover">
      <lucide-icon [img]="LogIn" class="w-5 h-5 stroke-[2px] text-brand-purple"></lucide-icon> Account
    </a>
  </nav>

  <hr class="border-none border-t border-[#231f23] mx-5 my-4" />

  <!-- Status & exit -->
  <section class="mt-auto px-[18px]">
    <button class="flex items-center justify-center gap-3 w-full mb-3 text-white bg-brand-purple rounded-xl text-[1.08rem] px-5 py-3 font-semibold border-none cursor-pointer shadow-[0_2px_10px_0_#a259f740] hover:bg-[#8e3ff2] transition-colors"
            (click)="exitApp()">
      <lucide-icon [img]="LogOut" class="w-5 h-5 stroke-[2px]"></lucide-icon> Exit
    </button>
  </section>
</aside>
